[build]
  publish = "."
  functions = "functions"

[[redirects]]
  from = "/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
